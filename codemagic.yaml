workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign
          find build -name "Runner.app" -type d
          APP_PATH=$(find build -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r app.ipa Payload
    artifacts:
      - build/ios/ipa/app.ipa